image:
  repository: ghcr.io/vaggeliskls/cloud-webdav-server
  tag: latest
  pullPolicy: Always

replicaCount: 1

serverPort: 8080
logLevel: "info"

# Folder permissions
# users: "public" = no auth, "*" = any authenticated, "alice bob" = specific, "* !charlie" = exclude
# mode: "ro" = read-only, "rw" = read-write
folderPermissions:
  - path: /public
    users: public
    mode: ro
  - path: /files
    users: "*"
    mode: rw
autoCreateFolders: true

# Allowed HTTP methods per access mode
roMethods:
  - GET
  - HEAD
  - OPTIONS
  - PROPFIND
rwMethods:
  - GET
  - HEAD
  - OPTIONS
  - PROPFIND
  - PUT
  - DELETE
  - MKCOL
  - COPY
  - MOVE
  - LOCK
  - UNLOCK
  - PROPPATCH

# ---------------------------------------------------------------------------
# Storage backend
# ---------------------------------------------------------------------------
storage:
  # One of: local | s3 | gcs | azure
  type: local

  # S3 / MinIO (used when type=s3)
  s3:
    bucket: ""
    region: "us-east-1"
    prefix: ""
    endpoint: ""   # custom endpoint for MinIO / LocalStack; leave empty for AWS
    # Stored in the chart-managed Secret. Ignored when existingSecret is set.
    accessKeyId: ""
    secretAccessKey: ""

    # Read AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY from a Secret you
    # manage outside the chart. When set, accessKeyId/secretAccessKey above
    # are ignored.
    #   kubectl create secret generic webdav-s3 \
    #     --from-literal=AWS_ACCESS_KEY_ID="..." \
    #     --from-literal=AWS_SECRET_ACCESS_KEY="..."
    existingSecret: ""
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY

  # Google Cloud Storage (used when type=gcs)
  #
  # Example:
  #   1. Create the secret from your service account key file:
  #        kubectl create secret generic gcs-credentials \
  #          --from-file=sa.json=/path/to/service-account.json \
  #          -n <namespace>
  #
  #   2. Set values:
  #        storage:
  #          type: gcs
  #          gcs:
  #            bucket: "my-webdav-bucket"
  #            serviceAccountSecret: "gcs-credentials"
  #
  # The chart mounts the secret at /secrets/gcs/sa.json and sets
  # GOOGLE_APPLICATION_CREDENTIALS automatically.
  gcs:
    bucket: ""
    prefix: ""
    serviceAccountSecret: ""  # name of the k8s Secret containing sa.json

  # Azure Blob Storage (used when type=azure)
  #
  # Authenticates with Shared Key. Set account + key — both are required.
  # The key is stored in the chart's Secret.
  #
  # Example:
  #   storage:
  #     type: azure
  #     azure:
  #       container: "my-webdav-container"
  #       account: "mystorageacct"
  #       key: "<account-key>"
  azure:
    container: ""
    prefix: ""
    account: ""
    # Stored in the chart-managed Secret. Ignored when existingSecret is set.
    key: ""
    endpoint: ""           # override service URL (Azure Stack / sovereign clouds); leave empty for public Azure

    # Read AZURE_STORAGE_KEY from a Secret you manage outside the chart.
    # When set, `key` above is ignored.
    #   kubectl create secret generic webdav-azure \
    #     --from-literal=AZURE_STORAGE_KEY="..."
    existingSecret: ""
    existingSecretKey: AZURE_STORAGE_KEY

# ---------------------------------------------------------------------------
# Basic Authentication
# ---------------------------------------------------------------------------
basicAuth:
  enabled: true
  # Users format: "username:password" space-separated (stored in Secret).
  # Ignored when existingSecret is set.
  users: "alice:alice123 bob:bob123"

  # Read BASIC_USERS from a Secret you manage outside the chart
  # (kubectl, Sealed Secrets, External Secrets, SOPS, etc).
  # When set, `users` above is ignored and the chart-managed Secret will
  # not contain BASIC_USERS.
  #
  # Create the Secret out-of-band, e.g.:
  #   kubectl create secret generic webdav-basic-auth \
  #     --from-literal=BASIC_USERS="alice:alice123 bob:bob456"
  existingSecret: ""           # name of the Secret
  existingSecretKey: BASIC_USERS  # key inside the Secret

# ---------------------------------------------------------------------------
# LDAP Authentication
# ---------------------------------------------------------------------------
ldap:
  enabled: false
  url: "ldaps://ldap.example.com"
  attribute: "uid"
  baseDN: "ou=users,dc=example,dc=com"
  bindDN: "uid=searchuser,ou=users,dc=example,dc=com"
  # Stored in the chart-managed Secret. Ignored when existingSecret is set.
  bindPassword: "securepassword"
  startTLS: false

  # Read LDAP_BIND_PASSWORD from a Secret you manage outside the chart.
  # When set, `bindPassword` above is ignored.
  #   kubectl create secret generic webdav-ldap \
  #     --from-literal=LDAP_BIND_PASSWORD="..."
  existingSecret: ""
  existingSecretKey: LDAP_BIND_PASSWORD

# ---------------------------------------------------------------------------
# OAuth 2.0 / OpenID Connect Authentication
# ---------------------------------------------------------------------------
oauth:
  enabled: false
  providerURL: "https://keycloak.example.com/realms/myrealm"
  clientID: "webdav-client"
  # Stored in the chart-managed Secret. Ignored when existingSecret is set.
  clientSecret: "secret"
  redirectURL: "https://files.example.com/oidc/callback"
  scopes: "openid email profile"
  usernameClaim: "preferred_username"

  # Read OIDC_CLIENT_SECRET from a Secret you manage outside the chart.
  # When set, `clientSecret` above is ignored.
  #   kubectl create secret generic webdav-oidc \
  #     --from-literal=OIDC_CLIENT_SECRET="..."
  existingSecret: ""
  existingSecretKey: OIDC_CLIENT_SECRET

# ---------------------------------------------------------------------------
# CORS
# ---------------------------------------------------------------------------
cors:
  enabled: false
  origin: "*"
  allowedMethods: "GET,HEAD,PUT,DELETE,MKCOL,COPY,MOVE,OPTIONS,PROPFIND,PROPPATCH,LOCK,UNLOCK"
  allowedHeaders: "Authorization,Content-Type,Depth,If,Lock-Token,Overwrite,Timeout,Destination,X-Requested-With"

# ---------------------------------------------------------------------------
# Browser access (returns 403 for Mozilla/* User-Agents)
# ---------------------------------------------------------------------------
browserAccessBlocked: false

# ---------------------------------------------------------------------------
# Persistent storage (used when storage.type=local)
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: "" # leave empty to use cluster default
  size: 10Gi

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  port: 80

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  host: "webdav.example.com"
  annotations: {}
  # Examples per ingress controller:
  #   Traefik: traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  #   nginx:   nginx.ingress.kubernetes.io/proxy-body-size: "0"
  #   GKE:     kubernetes.io/ingress.class: "gce"
  tls:
    enabled: false
    secretName: "webdav-tls"

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
